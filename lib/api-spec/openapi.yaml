openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VektraHub SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile and onboarding
  - name: businesses
    description: Business management
  - name: products
    description: Product catalog management
  - name: orders
    description: Order management
  - name: customers
    description: Customer CRM
  - name: dashboard
    description: Dashboard stats and analytics
  - name: chat
    description: AI assistant chat
  - name: admin
    description: Admin panel operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile with role and business
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /me/onboard:
    post:
      operationId: onboardBusiness
      tags: [users]
      summary: Onboard a new business for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardInput"
      responses:
        "201":
          description: Business created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard stats for the current business
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for the current business
      responses:
        "200":
          description: Recent orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products for the current business
      responses:
        "200":
          description: Top products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductStat"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products for the current business
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the current business
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, delivered, cancelled]
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers for the current business
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /admin/businesses:
    get:
      operationId: adminListBusinesses
      tags: [admin]
      summary: Admin - list all businesses
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, trial]
      responses:
        "200":
          description: All businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessAdmin"

  /admin/businesses/{id}:
    patch:
      operationId: adminUpdateBusiness
      tags: [admin]
      summary: Admin - update a business (activate, suspend, change plan)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessAdminUpdate"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessAdmin"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - platform-wide stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /store/{slug}:
    get:
      operationId: getStoreInfo
      tags: [store]
      summary: Get public store info
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Store info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreInfo"
        "404":
          description: Not found

  /store/{slug}/products:
    get:
      operationId: listStoreProducts
      tags: [store]
      summary: Get public catalog
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /store/{slug}/orders:
    post:
      operationId: createStoreOrder
      tags: [store]
      summary: Create an order from the public store
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreOrderResult"

  /store/{slug}/chat:
    post:
      operationId: storeChat
      tags: [store]
      summary: AI chat for the public store
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /store/{slug}/validate-coupon:
    post:
      operationId: validateStoreCoupon
      tags: [store]
      summary: Validate a coupon
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponInput"
      responses:
        "200":
          description: Coupon result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponValidation"

  /store/{slug}/mp/preference:
    post:
      operationId: createMpPreference
      tags: [store]
      summary: Create a Mercado Pago preference
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpPreferenceInput"
      responses:
        "200":
          description: MP preference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpPreferenceResponse"

  /me/business:
    get:
      operationId: getBusinessConfig
      tags: [businesses]
      summary: Get business configuration
      responses:
        "200":
          description: Business config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessConfig"
        "401":
          description: Unauthorized
    patch:
      operationId: updateBusinessConfig
      tags: [businesses]
      summary: Update business configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessConfig"

  /me/coupons:
    get:
      operationId: listCoupons
      tags: [businesses]
      summary: List coupons for the current business
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
        "401":
          description: Unauthorized
    post:
      operationId: createCoupon
      tags: [businesses]
      summary: Create a coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponInput"
      responses:
        "201":
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /me/coupons/{id}:
    patch:
      operationId: updateCoupon
      tags: [businesses]
      summary: Update a coupon
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponUpdate"
      responses:
        "200":
          description: Updated coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
    delete:
      operationId: deleteCoupon
      tags: [businesses]
      summary: Delete a coupon
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [client, admin]
        business:
          $ref: "#/components/schemas/Business"
      required:
        - clerkId
        - email
        - role

    UserProfileInput:
      type: object
      properties:
        name:
          type: string

    OnboardInput:
      type: object
      properties:
        businessName:
          type: string
        sector:
          type: string
          enum: [restaurante, kiosco, dietetica, ferreteria, ropa, distribuidora, otro]
        plan:
          type: string
          enum: [starter, pro]
      required:
        - businessName
        - sector
        - plan

    Business:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sector:
          type: string
        plan:
          type: string
          enum: [starter, pro]
        status:
          type: string
          enum: [active, suspended, trial]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sector
        - plan
        - status

    BusinessAdmin:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sector:
          type: string
        plan:
          type: string
          enum: [starter, pro]
        status:
          type: string
          enum: [active, suspended, trial]
        ownerEmail:
          type: string
        ownerName:
          type: ["string", "null"]
        productsCount:
          type: integer
        ordersCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sector
        - plan
        - status
        - ownerEmail
        - productsCount
        - ordersCount
        - createdAt

    BusinessAdminUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [active, suspended, trial]
        plan:
          type: string
          enum: [starter, pro]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: ["string", "null"]
        stock:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - active
        - createdAt

    ProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: integer
        imageUrl:
          type: string
        active:
          type: boolean
      required:
        - name
        - price

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: integer
        imageUrl:
          type: string
        active:
          type: boolean

    ProductStat:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
      required:
        - id
        - name
        - totalSold
        - revenue

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, delivered, cancelled]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - customerName
        - items
        - total
        - status
        - createdAt

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
      required:
        - productId
        - productName
        - quantity
        - unitPrice

    OrderInput:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        notes:
          type: string
      required:
        - customerName
        - items

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, delivered, cancelled]
        notes:
          type: string

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        totalOrders:
          type: integer
        totalSpent:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - totalOrders
        - totalSpent
        - createdAt

    CustomerInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
      required:
        - name

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string

    DashboardStats:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        totalProducts:
          type: integer
        totalCustomers:
          type: integer
        ordersToday:
          type: integer
        revenueToday:
          type: number
        pendingOrders:
          type: integer
        growthPercent:
          type: number
      required:
        - totalOrders
        - totalRevenue
        - totalProducts
        - totalCustomers
        - ordersToday
        - revenueToday
        - pendingOrders
        - growthPercent

    ChatMessageInput:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryItem"
      required:
        - message

    ChatHistoryItem:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        suggestions:
          type: array
          items:
            type: string
      required:
        - reply

    AdminStats:
      type: object
      properties:
        totalBusinesses:
          type: integer
        activeBusinesses:
          type: integer
        suspendedBusinesses:
          type: integer
        trialBusinesses:
          type: integer
        starterPlan:
          type: integer
        proPlan:
          type: integer
        newThisMonth:
          type: integer
      required:
        - totalBusinesses
        - activeBusinesses
        - suspendedBusinesses
        - trialBusinesses
        - starterPlan
        - proPlan
        - newThisMonth

    StoreInfo:
      type: object
      properties:
        name: { type: string }
        sector: { type: string }
        whatsappNumber: { type: ["string", "null"] }
        shippingCost: { type: ["number", "null"] }
        cashDiscount: { type: ["integer", "null"] }
        bankAlias: { type: ["string", "null"] }
        bankHolder: { type: ["string", "null"] }
        plan: { type: string }
        hasMpEnabled: { type: boolean }
      required: [name, sector, plan, hasMpEnabled]

    StoreOrderInput:
      type: object
      properties:
        customerName: { type: string }
        customerPhone: { type: string }
        customerEmail: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        deliveryType:
          type: string
          enum: [local, pickup, delivery]
        deliveryAddress:
          type: object
          properties:
            street: { type: string }
            number: { type: string }
            floor: { type: string }
            apt: { type: string }
            city: { type: string }
            zip: { type: string }
          required: [street, number, city]
        paymentMethod:
          type: string
          enum: [cash, transfer, mercadopago, debit, credit]
        couponCode: { type: string }
        discountAmount: { type: number }
        shippingAmount: { type: number }
        needsInvoice: { type: boolean }
        invoiceData:
          type: object
          properties:
            razonSocial: { type: string }
            cuit: { type: string }
            address: { type: string }
        notes: { type: string }
      required: [customerName, customerPhone, items, deliveryType, paymentMethod]

    StoreOrderResult:
      type: object
      properties:
        id: { type: integer }
        customerName: { type: string }
        total: { type: number }
        status: { type: string }
        ownerWhatsappUrl: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, customerName, total, status, createdAt]

    ValidateCouponInput:
      type: object
      properties:
        code: { type: string }
        subtotal: { type: number }
      required: [code, subtotal]

    MpPreferenceInput:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        backUrl: { type: string }

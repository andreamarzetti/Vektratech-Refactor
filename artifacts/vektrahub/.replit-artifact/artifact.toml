kind = "web"
previewPath = "/"
title = "VektraHub"
version = "1.0.0"
id = "artifacts/vektrahub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21099

[services.development]
run = "pnpm --filter @workspace/vektrahub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vektrahub", "run", "build" ]
publicDir = "artifacts/vektrahub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21099"
BASE_PATH = "/"
